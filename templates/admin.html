<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { font-family: Arial; background: #111; color: white; }
        table { width: 80%; margin: 50px auto; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #444; text-align: center; }
        th { background: #2563eb; }
    </style>
</head>
<body>

<h2 style="text-align:center;">Aura Admin Dashboard</h2>

<table>
    <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Login Count</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user["username"] }}</td>
        <td>{{ user["email"] }}</td>
        <td>{{ user["login_count"] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
